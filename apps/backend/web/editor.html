<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MISU Admin · Meeting editor</title>
  <style>
    :root { --purple: #5b2a86; --ink: #1c1c1e; --muted: #8a8a8f; --line: #ececee; --bg: #f5f5f7; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
           color: var(--ink); background: var(--bg); }
    header { background: var(--purple); color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 20px; }
    header .brand { font-weight: 700; font-size: 18px; }
    header nav a { color: #fff; opacity: .85; text-decoration: none; margin-right: 16px; }
    main { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .row { display: flex; flex-wrap: wrap; gap: 16px; }
    .field { display: flex; flex-direction: column; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    input, select { font-size: 14px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    input:focus, select:focus { outline: none; border-color: var(--purple); }
    .grow { flex: 1; min-width: 180px; }
    h2 { font-size: 15px; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; }
    td { padding: 5px 8px; vertical-align: middle; }
    td input { width: 100%; }
    td.narrow input { width: 62px; }
    .start { font-variant-numeric: tabular-nums; color: var(--purple); font-weight: 600; white-space: nowrap; }
    .iconbtn { border: none; background: #f0ecf6; color: var(--purple); border-radius: 6px; width: 28px; height: 28px;
               cursor: pointer; font-size: 14px; line-height: 1; }
    .iconbtn.del { background: #fbeaec; color: #b00020; }
    td.utils { white-space: nowrap; text-align: right; }
    .utilgroup { display: flex; gap: 4px; justify-content: flex-end; }
    .iconbtn.add { background: #e7f5ea; color: #2e7d32; }
    .pill { display: inline-block; font-size: 12px; padding: 5px 12px; border-radius: 999px; align-self: flex-start; }
    .pill.draft { background: #fff3e0; color: #b26a00; }
    .pill.published, .pill.open { background: #e8f5e9; color: #2e7d32; }
    .pill.ongoing { background: #e3f2fd; color: #1565c0; }
    .pill.archived { background: #eceff1; color: #546e7a; }
    input[readonly] { background: var(--bg); color: var(--muted); }
    .checks { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; }
    .check { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 13px; }
    .check input { width: auto; }
    .btn { padding: 10px 18px; border-radius: 8px; border: none; background: var(--purple); color: #fff; font-size: 14px; cursor: pointer; }
    .btn.outline { background: #fff; color: var(--purple); border: 1px solid var(--purple); }
    .btn.ghost { background: #f0ecf6; color: var(--purple); }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .actions .spacer { flex: 1; }
    .muted { color: var(--muted); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff;
             padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <span class="brand">MISU Admin</span>
    <nav><a href="/meetings">← Meetings</a></nav>
    <span id="heading" style="opacity:.85"></span>
    <a href="#" onclick="logout(event)" style="margin-left:auto;color:#fff;opacity:.85;text-decoration:none">Logout</a>
  </header>
  <main>
    <div class="card" id="startFromCard" style="display:none">
      <div class="field" style="max-width:360px">
        <label>Start from</label>
        <select id="startFrom" onchange="onStartFrom()"></select>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div class="field grow"><label>Title</label><input id="title" placeholder="Regular Meeting #142" /></div>
        <div class="field" style="width:120px"><label>Number</label><input id="number" type="number" /></div>
        <div class="field" style="width:120px"><label>Status</label><span id="statusPill" class="pill draft">draft</span></div>
      </div>
      <div class="row">
        <div class="field grow"><label>Theme</label><input id="theme" placeholder="Embrace Change" /></div>
        <div class="field grow"><label>Venue</label><input id="venue" placeholder="Room A" /></div>
      </div>
      <div class="row">
        <div class="field"><label>Date</label><input id="date" type="date" /></div>
        <div class="field"><label>Start</label><input id="start_time" type="time" /></div>
        <div class="field"><label>End</label><input id="end_time" type="time" /></div>
      </div>
    </div>

    <div class="card">
      <h2>Roles</h2>
      <table>
        <thead>
          <tr>
            <th>Role</th><th style="width:150px">Label</th><th style="width:80px">Optional?</th><th style="width:170px">Booked by</th><th style="width:150px"></th>
          </tr>
        </thead>
        <tbody id="slots"></tbody>
      </table>
      <div class="muted" style="margin-top:8px; font-size:12px">
        Roles with no session are meeting-wide (Timer, Grammarian…). Repeated roles are numbered automatically.
      </div>
    </div>

    <div class="card">
      <h2>Sessions</h2>
      <table>
        <thead>
          <tr>
            <th style="width:80px">Start</th><th>Group</th>
            <th>Session</th><th style="width:70px">Min</th><th style="width:200px">Role</th><th style="width:150px"></th>
          </tr>
        </thead>
        <tbody id="sessions"></tbody>
      </table>
    </div>

    <div class="actions">
      <label class="check"><input id="is_template" type="checkbox" /> Template</label>
      <label class="check"><input id="is_published" type="checkbox" /> Published</label>
      <div class="spacer"></div>
      <button class="btn outline" onclick="previewAgenda()">Preview agenda</button>
      <button class="btn" onclick="save()">Save</button>
    </div>
  </main>
  <datalist id="roles-list"></datalist>
  <datalist id="users-list"></datalist>
  <div class="toast" id="toast"></div>

  <script>
    async function logout(e) {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/login';
    }
    const BUFFER_MINUTES = 1;
    let state = {
      meetingId: null, number: '', title: '', theme: '', date: '', start_time: '19:00',
      end_time: '21:00', venue: '', status: 'draft', is_template: false, slots: [], sessions: []
    };

    // --- helpers ---
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function toMinutes(hhmm) { const [h, m] = (hhmm || '0:0').split(':').map(Number); return h * 60 + m; }
    function toHHMM(mins) { const h = Math.floor(mins / 60), m = mins % 60; return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'); }
    function addDays(iso, days) { const d = new Date(iso + 'T00:00'); d.setDate(d.getDate() + days);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

    function meetingIdFromPath() {
      const m = location.pathname.match(/\/meetings\/(\d+)\/edit/);
      return m ? parseInt(m[1], 10) : null;
    }

    // --- header fields <-> state ---
    const FIELDS = ['number','title','theme','date','start_time','end_time','venue'];
    function bindHeader() {
      for (const f of FIELDS) {
        const el = document.getElementById(f);
        el.addEventListener('input', () => { state[f] = el.value; if (f === 'start_time') renderStarts(); if (f === 'date' || f === 'start_time') renderStatus(); });
      }
      document.getElementById('is_template').addEventListener('change', e => { state.is_template = e.target.checked; });
      document.getElementById('is_published').addEventListener('change', e => { state.status = e.target.checked ? 'published' : 'draft'; renderStatus(); });
    }
    function fillHeader() {
      for (const f of FIELDS) document.getElementById(f).value = state[f] ?? '';
      document.getElementById('is_template').checked = !!state.is_template;
      document.getElementById('is_published').checked = state.status === 'published';
      renderStatus();
    }
    function renderStatus() {
      const pill = document.getElementById('statusPill');
      const ph = meetingPhase();
      pill.className = 'pill ' + ph;
      pill.textContent = ph;
    }
    /// Derived lifecycle phase mirroring the server: draft | open | ongoing | archived.
    function meetingPhase() {
      if (state.status !== 'published') return 'draft';
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const d = new Date((state.date || '') + 'T00:00');
      if (isNaN(d.getTime())) return 'open';
      if (d < today) return 'archived';
      if (d > today) return 'open';
      const [h, m] = (state.start_time || '0:0').split(':').map(Number);
      const start = new Date(); start.setHours(h || 0, m || 0, 0, 0);
      return new Date() >= start ? 'ongoing' : 'open';
    }

    // --- rendering ---
    function render() { renderSlots(); renderSessions(); }

    // --- roles (slots) ---
    function emptySlot() { return { role_slot_id: null, roleName: '', label: '', optional: false, booker_id: null, booker_name: null, bookerName: '' }; }
    function insertSlot(i) {
      state.slots.splice(i + 1, 0, emptySlot());
      // Shift session references that point past the insertion point.
      state.sessions.forEach(s => { if (s.slotIndex != null && s.slotIndex > i) s.slotIndex += 1; });
      render();
    }
    function moveSlot(i, dir) {
      const j = i + dir; if (j < 0 || j >= state.slots.length) return;
      [state.slots[i], state.slots[j]] = [state.slots[j], state.slots[i]];
      // Keep session references pointing at the slots they were on.
      state.sessions.forEach(s => {
        if (s.slotIndex === i) s.slotIndex = j;
        else if (s.slotIndex === j) s.slotIndex = i;
      });
      render();
    }
    function deleteSlot(i) {
      state.slots.splice(i, 1);
      // Fix up sessions that referenced this or a later slot.
      state.sessions.forEach(s => {
        if (s.slotIndex === i) s.slotIndex = null;
        else if (s.slotIndex != null && s.slotIndex > i) s.slotIndex -= 1;
      });
      render();
    }
    function updSlot(i, val) {
      state.slots[i].roleName = val;
      // Keep focus in the input: refresh only derived labels + the session pickers.
      refreshSlotLabels();
      renderSessions();
    }
    /// Display label for a slot: role name plus an ordinal when the role repeats.
    function slotLabel(index) {
      const sl = state.slots[index];
      const name = (sl && sl.roleName || '').trim();
      if (!name) return '';
      let total = 0, ordinal = 0;
      state.slots.forEach((o, j) => {
        if ((o.roleName || '').trim() === name) { total++; if (j <= index) ordinal++; }
      });
      return total > 1 ? `${name} ${ordinal}` : name;
    }
    function refreshSlotLabels() {
      // Update only the auto (non-custom) label inputs so a role rename re-derives them
      // while custom labels stay untouched.
      document.querySelectorAll('#slots .slot-label-input').forEach((input, i) => {
        const sl = state.slots[i];
        if (sl && !(sl.label || '').trim()) input.value = slotLabel(i) || '';
      });
    }
    function updSlotLabel(i, val) { state.slots[i].label = val; renderSessions(); }
    function toggleOptional(i, checked) { state.slots[i].optional = !!checked; }
    /// Effective display label: the custom label when set, otherwise the derived one.
    function effectiveLabel(i) {
      const sl = state.slots[i];
      const custom = (sl && sl.label || '').trim();
      return custom || slotLabel(i);
    }
    function renderSlots() {
      const tbody = document.getElementById('slots');
      tbody.innerHTML = '';
      if (!state.slots.length) state.slots.push(emptySlot());
      state.slots.forEach((sl, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input list="roles-list" value="${escapeHtml(sl.roleName)}" placeholder="Role name" oninput="updSlot(${i}, this.value)" /></td>
          <td><input class="slot-label-input" value="${escapeHtml(effectiveLabel(i))}" placeholder="Label" oninput="updSlotLabel(${i}, this.value)" /></td>
          <td style="text-align:center"><input type="checkbox" style="width:auto" ${sl.optional ? 'checked' : ''} onchange="toggleOptional(${i}, this.checked)" /></td>
          <td><input list="users-list" class="booker" value="${escapeHtml(sl.bookerName || '')}" placeholder="— unassigned —" oninput="updBooker(${i}, this.value)" /></td>
          <td class="utils">
            <div class="utilgroup">
              <button class="iconbtn add" title="Add below" onclick="insertSlot(${i})">＋</button>
              <button class="iconbtn" title="Move up" onclick="moveSlot(${i},-1)">▲</button>
              <button class="iconbtn" title="Move down" onclick="moveSlot(${i},1)">▼</button>
              <button class="iconbtn del" title="Delete role" onclick="deleteSlot(${i})">×</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    // --- users (booker assignment) ---
    // Booker edits are local; they are applied in a batch by save() after the meeting
    // document is saved (new users are created then, too).
    let allUsers = [];
    async function loadUsers() {
      try {
        const res = await fetch('/api/users');
        allUsers = await res.json();
      } catch (e) { allUsers = []; }
      refreshUsersList();
    }
    function refreshUsersList() {
      const dl = document.getElementById('users-list');
      dl.innerHTML = allUsers.map(u => `<option value="${escapeHtml(u.display_name)}"></option>`).join('');
    }
    function updBooker(i, val) { state.slots[i].bookerName = val; }

    // Assign (bookerId set) or release (null) a slot's booker via the unified booking
    // endpoint. The admin `user_id` field is honored because the caller is a manager.
    async function setAssignment(slotId, bookerId) {
      const body = bookerId
        ? { meeting_id: state.meetingId, role_slot_id: slotId, user_id: bookerId }
        : { meeting_id: state.meetingId, role_slot_id: slotId, cancel: true };
      const res = await fetch('/api/book', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }
    async function createUser(name) {
      const res = await fetch('/api/users', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ display_name: name })
      });
      if (!res.ok) throw new Error(await res.text());
      const u = await res.json();
      allUsers.push(u); refreshUsersList();
      return u;
    }
    function findUser(name) {
      const n = name.toLowerCase();
      return allUsers.find(u => u.display_name.toLowerCase() === n);
    }

    /// After a meeting save, patch server slot ids onto the live slots (existing by id,
    /// new by unclaimed-id order) and refresh each slot's server booker baseline.
    function reconcileSavedSlots(saved) {
      state.meetingId = saved.id;
      state.number = saved.number;
      state.status = saved.status;
      const savedSlots = saved.role_slots || [];
      const byId = {};
      savedSlots.forEach(s => { byId[s.id] = s; });
      const roleBearing = state.slots.filter(sl => (sl.roleName || '').trim());
      const claimed = new Set();
      roleBearing.forEach(sl => {
        if (sl.role_slot_id && byId[sl.role_slot_id]) {
          claimed.add(sl.role_slot_id);
          const s = byId[sl.role_slot_id];
          sl.booker_id = s.booker_id; sl.booker_name = s.booker_name || null;
        }
      });
      const unclaimed = savedSlots.filter(s => !claimed.has(s.id)).sort((a, b) => a.id - b.id);
      let ui = 0;
      roleBearing.forEach(sl => {
        if (!sl.role_slot_id || !byId[sl.role_slot_id]) {
          const s = unclaimed[ui++];
          if (s) { sl.role_slot_id = s.id; sl.booker_id = s.booker_id; sl.booker_name = s.booker_name || null; }
        }
      });
    }

    /// Apply the pending booker edits as a batch: create any new users, then assign.
    /// Returns the number of slots changed.
    async function applyAssignments() {
      const jobs = state.slots.filter(sl =>
        (sl.roleName || '').trim() && sl.role_slot_id &&
        (sl.bookerName || '').trim() !== (sl.booker_name || '').trim());
      if (!jobs.length) return 0;
      // Create any users that don't exist yet (sequential so duplicates collapse).
      for (const sl of jobs) {
        const want = (sl.bookerName || '').trim();
        if (want && !findUser(want)) await createUser(want);
      }
      await Promise.all(jobs.map(async sl => {
        const want = (sl.bookerName || '').trim();
        const user = want ? findUser(want) : null;
        await setAssignment(sl.role_slot_id, user ? user.id : null);
        sl.booker_id = user ? user.id : null;
        sl.booker_name = user ? user.display_name : null;
        sl.bookerName = user ? user.display_name : '';
      }));
      return jobs.length;
    }

    // --- sessions grid ---
    function emptySession() {
      return { group_label: '', name: '', duration_minutes: 5, slotIndex: null };
    }
    function addSession() {
      state.sessions.push(emptySession());
      renderSessions();
    }
    function insertSession(i) {
      state.sessions.splice(i + 1, 0, emptySession());
      renderSessions();
    }
    function deleteSession(i) { state.sessions.splice(i, 1); renderSessions(); }
    function move(i, dir) {
      const j = i + dir; if (j < 0 || j >= state.sessions.length) return;
      [state.sessions[i], state.sessions[j]] = [state.sessions[j], state.sessions[i]];
      renderSessions();
    }
    function renderStarts() {
      let cursor = toMinutes(document.getElementById('start_time').value || state.start_time);
      const cells = document.querySelectorAll('#sessions .start');
      state.sessions.forEach((s, i) => {
        if (cells[i]) cells[i].textContent = toHHMM(cursor);
        cursor += Number(s.duration_minutes) || 0;
        if (i < state.sessions.length - 1) cursor += BUFFER_MINUTES;
      });
    }
    function roleOptions(selected) {
      let opts = `<option value="">— none —</option>`;
      state.slots.forEach((sl, j) => {
        const label = effectiveLabel(j) || '(unnamed role)';
        opts += `<option value="${j}" ${selected === j ? 'selected' : ''}>${escapeHtml(label)}</option>`;
      });
      return opts;
    }
    function renderSessions() {
      const tbody = document.getElementById('sessions');
      tbody.innerHTML = '';
      if (!state.sessions.length) state.sessions.push(emptySession());
      state.sessions.forEach((s, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="start"></td>
          <td><input value="${escapeHtml(s.group_label)}" oninput="upd(${i},'group_label',this.value)" /></td>
          <td><input value="${escapeHtml(s.name)}" oninput="upd(${i},'name',this.value)" /></td>
          <td class="narrow"><input type="number" min="0" value="${s.duration_minutes}" oninput="upd(${i},'duration_minutes',this.value); renderStarts()" /></td>
          <td><select onchange="setSlot(${i}, this.value)">${roleOptions(s.slotIndex)}</select></td>
          <td class="utils">
            <div class="utilgroup">
              <button class="iconbtn add" title="Add below" onclick="insertSession(${i})">＋</button>
              <button class="iconbtn" title="Move up" onclick="move(${i},-1)">▲</button>
              <button class="iconbtn" title="Move down" onclick="move(${i},1)">▼</button>
              <button class="iconbtn del" title="Delete" onclick="deleteSession(${i})">×</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
      renderStarts();
    }
    function upd(i, field, val) { state.sessions[i][field] = val; }
    function setSlot(i, val) { state.sessions[i].slotIndex = val === '' ? null : Number(val); }

    // --- load roles for the combobox ---
    async function loadRoles() {
      const res = await fetch('/api/roles');
      const roles = await res.json();
      const dl = document.getElementById('roles-list');
      dl.innerHTML = roles.map(r => `<option value="${escapeHtml(r.name)}"></option>`).join('');
    }

    // --- load an existing meeting into state ---
    function applyDetail(d, asTemplate) {
      const rawSlots = d.role_slots || [];
      const slots = rawSlots.map(s => ({
        role_slot_id: asTemplate ? null : s.id,
        roleName: s.role_name,
        label: s.custom_label || '',
        optional: !!s.is_optional,
        booker_id: asTemplate ? null : s.booker_id,
        booker_name: asTemplate ? null : s.booker_name,
        bookerName: asTemplate ? '' : (s.booker_name || '')
      }));
      const idToIndex = {};
      rawSlots.forEach((s, idx) => { idToIndex[s.id] = idx; });
      const sessions = (d.sessions || []).slice().sort((a,b) => a.position - b.position).map(s => ({
        group_label: s.group_label || '', name: s.name || '', duration_minutes: s.duration_minutes || 0,
        slotIndex: (s.role_slot_id != null && idToIndex[s.role_slot_id] != null) ? idToIndex[s.role_slot_id] : null
      }));
      if (!sessions.length) sessions.push(emptySession());
      state = {
        meetingId: asTemplate ? null : d.id,
        number: asTemplate ? (d.number + 1) : d.number,
        title: d.title, theme: d.theme || '',
        date: asTemplate ? addDays(d.date, 14) : d.date,
        start_time: d.start_time || '19:00', end_time: d.end_time || '21:00',
        venue: d.venue || '', status: asTemplate ? 'draft' : (d.status || 'draft'),
        is_template: asTemplate ? false : !!d.is_template, slots, sessions
      };
      fillHeader(); render();
    }

    // --- "Start from" (new meeting only) ---
    let templates = [], lastMeeting = null;
    async function setupStartFrom() {
      document.getElementById('startFromCard').style.display = 'block';
      const [allRes, tplRes] = await Promise.all([
        fetch('/api/meetings?scope=all'), fetch('/api/meetings?scope=templates')
      ]);
      const all = await allRes.json();
      templates = await tplRes.json();
      lastMeeting = all[0] || null;
      const sel = document.getElementById('startFrom');
      let opts = '<option value="blank">Blank</option>';
      if (lastMeeting) opts += `<option value="last" selected>Last meeting · #${lastMeeting.number} ${escapeHtml(lastMeeting.title)}</option>`;
      for (const t of templates) opts += `<option value="tpl:${t.id}">Template · ${escapeHtml(t.title)}</option>`;
      sel.innerHTML = opts;
      if (lastMeeting) { await loadFrom('last'); } else { await loadFrom('blank'); }
    }
    function onStartFrom() { loadFrom(document.getElementById('startFrom').value); }
    async function loadFrom(choice) {
      if (choice === 'blank') {
        state = { meetingId: null, number: lastMeeting ? lastMeeting.number + 1 : 1, title: '', theme: '',
          date: '', start_time: '19:00', end_time: '21:00', venue: '', status: 'draft', is_template: false, slots: [], sessions: [emptySession()] };
        fillHeader(); render(); return;
      }
      const id = choice === 'last' ? lastMeeting.id : parseInt(choice.split(':')[1], 10);
      const res = await fetch('/api/meetings/' + id);
      applyDetail(await res.json(), true); // asTemplate: fresh draft, ids cleared
    }

    // --- save ---
    function buildBody() {
      // Only slots with a role name are real; remap indices after filtering blanks.
      const role_slots = [];
      const slotRemap = {}; // state.slots index -> posted role_slots index
      state.slots.forEach((sl, idx) => {
        const roleName = (sl.roleName || '').trim();
        if (roleName) {
          slotRemap[idx] = role_slots.length;
          role_slots.push({ role_slot_id: sl.role_slot_id || null, role_name: roleName, label: (sl.label || '').trim() || null, is_optional: !!sl.optional });
        }
      });
      const sessions = state.sessions.map((s, i) => {
        let role_slot_index = null;
        if (s.slotIndex != null && slotRemap[s.slotIndex] != null) {
          role_slot_index = slotRemap[s.slotIndex];
        }
        return {
          position: i + 1, group_label: s.group_label || '', name: (s.name || '').trim(),
          duration_minutes: Number(s.duration_minutes) || 0, role_slot_index
        };
      });
      return {
        meeting_id: state.meetingId,
        number: state.number === '' ? null : Number(state.number),
        title: (state.title || '').trim(), theme: (state.theme || '').trim(),
        date: state.date, start_time: state.start_time, end_time: state.end_time,
        venue: (state.venue || '').trim(),
        is_template: !!state.is_template,
        status: state.status === 'published' ? 'published' : 'draft',
        role_slots, sessions
      };
    }
    async function save() {
      const body = buildBody();
      if (!body.title) { toast('Title is required'); return; }
      if (!body.date) { toast('Date is required'); return; }
      const res = await fetch('/api/meetings', {
        method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body)
      });
      if (!res.ok) { toast('Save failed: ' + (await res.text())); return; }
      const saved = await res.json();
      const wasNew = meetingIdFromPath() !== saved.id;
      // Patch server slot ids onto the live slots (keeps pending booker edits intact).
      reconcileSavedSlots(saved);
      document.getElementById('number').value = saved.number;
      renderStatus();
      // Apply the pending booker assignments (and create new users) in one batch.
      let assignErr = null;
      try { await applyAssignments(); } catch (e) { assignErr = e; }
      renderSlots(); renderSessions();
      // Switch URL to edit mode so further saves update the same meeting.
      if (wasNew) {
        history.replaceState(null, '', '/meetings/' + saved.id + '/edit');
        document.getElementById('startFromCard').style.display = 'none';
      }
      document.getElementById('heading').textContent = 'Editing #' + saved.number;
      if (assignErr) { toast('Saved, but some assignments failed: ' + (assignErr.message || assignErr)); return; }
      toast('Saved');
    }
    function previewAgenda() {
      if (!state.meetingId) { toast('Save the meeting first'); return; }
      window.open('/meetings/' + state.meetingId + '/agenda/print', '_blank');
    }

    // --- init ---
    async function init() {
      bindHeader();
      await Promise.all([loadRoles(), loadUsers()]);
      const id = meetingIdFromPath();
      if (id) {
        document.getElementById('heading').textContent = 'Editing #…';
        const res = await fetch('/api/meetings/' + id);
        if (!res.ok) { toast('Meeting not found'); return; }
        const d = await res.json();
        applyDetail(d, false);
        document.getElementById('heading').textContent = 'Editing #' + d.number;
      } else {
        document.getElementById('heading').textContent = 'New meeting';
        await setupStartFrom();
      }
    }
    init();
  </script>
</body>
</html>
